<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Finance - Analytics & Yield Pool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        #modalOverlay, #deleteModalOverlay { transition: opacity 0.3s many; }
        .action-btn { opacity: 0; transition: opacity 0.2s; }
        tr:hover .action-btn { opacity: 1; }
        #syncBtn { min-width: 120px; justify-content: center; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(225, 29, 72, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }
        .sync-warning { animation: pulse-red 2s infinite; }
        select { cursor: pointer; padding-right: 2.5rem !important; }
        .rate-input { 
            background: transparent; 
            border-bottom: 1px dashed #334155; 
            text-align: center; 
            outline: none; 
            -moz-appearance: textfield;
        }
        .rate-input::-webkit-outer-spin-button,
        .rate-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .rate-input:focus { border-bottom-color: #10b981; color: #10b981; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 p-4 md:p-8">

    <div id="modalOverlay" class="fixed inset-0 bg-slate-950/60 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl w-full max-w-sm">
            <center><h3 class="text-xl font-bold text-emerald-500 mb-2">New Category</h3></center>
            <input type="text" id="modalInput" placeholder="e.g., Subscriptions" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white outline-none mb-4 ring-2 ring-transparent focus:ring-emerald-500 transition-all">
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold hover:bg-slate-700">Cancel</button>
                <button onclick="confirmNewCategory()" class="flex-1 px-4 py-3 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-500">Create</button>
            </div>
        </div>
    </div>

    <div id="deleteModalOverlay" class="fixed inset-0 bg-slate-950/60 backdrop-blur-md z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl w-full max-w-sm">
           <center><h3 class="text-xl font-bold text-rose-500 mb-2">Delete Entry?</h3></center>
            <div id="deleteItemDetails" class="bg-slate-950/50 rounded-2xl p-4 mb-6 border border-slate-800 text-center">
                <p id="delInfoDate" class="text-[10px] text-slate-500 font-mono"></p>
                <p id="delInfoCategory" class="text-lg font-bold text-slate-200"></p>
                <p id="delInfoAmount" class="text-xl font-mono font-black"></p>
            </div>
            <input type="hidden" id="deleteTargetIndex">
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 px-4 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold hover:bg-slate-700">Go Back</button>
                <button onclick="confirmDelete()" class="flex-1 px-4 py-3 rounded-xl bg-rose-600 text-white font-bold hover:bg-rose-500">Delete</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col gap-6 mb-8 border-b border-slate-800 pb-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-3xl font-black text-emerald-500 tracking-tighter italic">Financial Analytics</h1><br>
                    <p id="statusText" class="text-red-500 text-xs font-mono uppercase italic">Disconnected</p>
                </div>
                <div class="flex items-center gap-3">
                    <button id="syncBtn" title="Saves changes and refreshes dashboard" onclick="saveToDisk()" disabled class="bg-slate-800 text-slate-500 px-6 py-2 rounded-full font-bold text-sm flex items-center gap-2 border border-slate-700 transition-all">
                        <span>🔄</span> Sync 
                    </button>
                    <button id="connectBtn" onclick="openMasterFile()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full font-bold text-sm transition-all shadow-lg shadow-blue-900/20">
                        📂 Connect/Change File
                    </button>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-4 bg-slate-900 p-4 rounded-2xl border border-slate-800">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 mb-1 uppercase">Year</label>
                    <select id="filterYear" onchange="updateUI()" class="bg-slate-800 border-none rounded-lg p-2 pr-7 text-sm text-white outline-none w-32 appearance-none" style="background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22white%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><polyline points=%226 9 12 15 18 9%22></polyline></svg>'); background-repeat: no-repeat; background-position: right 0.5rem center; background-size: 1em;">
                        <option value="2026">2026</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 mb-1 uppercase">Month</label>
                    <select id="filterMonth" onchange="updateUI()" class="bg-slate-800 border-none rounded-lg p-2 pr-8 text-sm text-white outline-none w-40 appearance-none" style="background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22white%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><polyline points=%226 9 12 15 18 9%22></polyline></svg>'); background-repeat: no-repeat; background-position: right 0.75rem center; background-size: 1em;">
                        <option value="all">Full Year (All)</option>
                        <option value="0">January</option><option value="1">February</option>
                        <option value="2">March</option><option value="3">April</option>
                        <option value="4">May</option><option value="5">June</option>
                        <option value="6">July</option><option value="7">August</option>
                        <option value="8">September</option><option value="9">October</option>
                        <option value="10">November</option><option value="11">December</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-stretch">
            <div class="lg:col-span-1 flex flex-col gap-6">
                <section class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                    <h2 class="text-lg font-bold mb-4 text-slate-300">Log Entry</h2>
                    <form id="txForm" class="space-y-4">
                        <input type="hidden" id="editIndex" value="-1">
                        <input type="date" id="date" required class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm text-white outline-none">
                        <select id="category" required onchange="handleCategoryChange(this)" class="w-full bg-slate-800 border-none rounded-lg p-3 pr-10 text-sm text-white outline-none appearance-none" style="background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22white%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><polyline points=%226 9 12 15 18 9%22></polyline></svg>'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em;">
                            <option value="" disabled selected>Select Category</option>
                            <option value="NEW_CAT" class="text-emerald-500 font-bold">+ Add New Category</option>
                        </select>
                        <input type="text" id="amount" placeholder="Amount" required oninput="formatInputAmount(this)" class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm text-white outline-none font-mono">
                        <select id="type" class="w-full bg-slate-800 border-none rounded-lg p-3 pr-10 text-sm text-white outline-none appearance-none" style="background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22white%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><polyline points=%226 9 12 15 18 9%22></polyline></svg>'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1.2em;">
                            <option value="Expense">Expense</option>
                            <option value="Income">Income</option>
                        </select>
                        <button type="submit" id="submitBtn" disabled class="w-full bg-slate-800 text-slate-600 py-4 rounded-xl font-black text-sm uppercase border border-slate-700">Connect First</button>
                        <button type="button" id="cancelEditBtn" onclick="resetForm()" class="hidden w-full bg-slate-700 text-slate-300 py-2 rounded-lg text-xs uppercase font-bold">Cancel Edit</button>
                    </form>
                </section>

                <section class="bg-slate-900 p-6 rounded-2xl border border-emerald-900/30 bg-gradient-to-b from-slate-900 to-emerald-950/20 shadow-2xl flex-grow">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">📈</span>
                            <h2 class="text-lg font-black text-emerald-400 tracking-tight uppercase">Yield Pool</h2>
                        </div>
                        <button onclick="toggleRateEdit()" id="rateEditBtn" class="text-[10px] font-bold text-slate-500 hover:text-emerald-500 transition-colors uppercase">Edit Rates</button>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <p class="text-[10px] text-slate-500 uppercase font-black">Max Investable Amount</p>
                            <p id="poolMax" class="text-2xl font-mono text-white font-black">&#8369 0.00</p>
                        </div>
                        <div class="space-y-2 pt-2 border-t border-slate-800">
                            <div class="flex justify-between text-xs">
                                <span class="text-slate-400 flex items-center gap-1">(<input type="number" id="rateDigi" value="6" step="0.1" oninput="limitAndRefresh(this)" class="rate-input" style="width: 3ch;" disabled>%) Digital Banks </span>
                                <span id="yieldDigi" class="font-mono text-emerald-500">+₱0.00</span>
                            </div>
                            <div class="flex justify-between text-xs">
                                <span class="text-slate-400 flex items-center gap-1">(<input type="number" id="rateMP2" value="7" step="0.1" oninput="limitAndRefresh(this)" class="rate-input" style="width: 3ch;" disabled>%) Pag-Ibig Mp2 </span>
                                <span id="yieldMP2" class="font-mono text-emerald-500">+₱0.00</span>
                            </div>
                            <div class="flex justify-between text-xs">
                                <span class="text-slate-400 flex items-center gap-1">(<input type="number" id="rateStock" value="8" step="0.1" oninput="limitAndRefresh(this)" class="rate-input" style="width: 3ch;" disabled>%) Div. Stocks </span>
                                <span id="yieldStock" class="font-mono text-emerald-500">+₱0.00</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-3 flex flex-col gap-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 h-fit">
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                        <p id="labelNet" class="text-[10px] text-slate-500 uppercase font-black">Net Cash (Total)</p>
                        <p id="statNet" class="text-2xl font-mono text-white mt-1">₱0.00</p>
                    </div>
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                        <div class="flex justify-between items-start">
                            <p id="labelExp" class="text-[10px] text-slate-500 uppercase font-black">Cash Flow</p>
                            <span id="yoYIndicator" class="text-[9px] font-bold px-2 py-0.5 rounded-full hidden cursor-help"></span>
                        </div>
                        <p id="statExp" class="text-2xl font-mono text-white mt-1">₱0.00</p>
                    </div>
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg relative overflow-hidden">
                        <p id="labelPrev" class="text-[10px] text-slate-500 uppercase font-black">Prev Cash Flow</p>
                        <p id="statPrevYear" class="text-2xl font-mono text-white mt-1">₱0.00</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 flex-grow">
                    <div class="bg-slate-900 rounded-2xl border border-slate-800 flex flex-col shadow-xl overflow-hidden h-full">
                        <div class="p-3 bg-slate-800/30 text-[10px] font-black tracking-widest uppercase">
                            <span>Finance History</span>
                        </div>
                        <div class="overflow-y-auto custom-scrollbar flex-grow">
                            <table class="w-full text-xs text-left">
                                <tbody id="tableBody"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex flex-col shadow-xl h-full">
                        <div class="text-[10px] font-black tracking-widest uppercase text-slate-500 mb-4">Expense Distribution</div>
                        <div class="flex-grow flex items-center justify-center min-h-0">
                            <canvas id="mainChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let fileHandle;
        let db = [];
        let chartInstance = null;
        let hasUnsavedChanges = false;
        const phFormat = new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' });

        const DB_NAME = "FileStorage";
        const STORE_NAME = "handles";

        async function getDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveHandle(handle) {
            const dbObj = await getDB();
            const tx = dbObj.transaction(STORE_NAME, "readwrite");
            tx.objectStore(STORE_NAME).put(handle, "last_handle");
        }

        async function loadHandle() {
            const dbObj = await getDB();
            return new Promise((resolve) => {
                const request = dbObj.transaction(STORE_NAME).objectStore(STORE_NAME).get("last_handle");
                request.onsuccess = () => resolve(request.result);
            });
        }

        async function verifyPermission(handle, readWrite) {
            const options = {};
            if (readWrite) options.mode = 'readwrite';
            if ((await handle.queryPermission(options)) === 'granted') return true;
            if ((await handle.requestPermission(options)) === 'granted') return true;
            return false;
        }

        window.onload = async () => {
            document.getElementById('date').valueAsDate = new Date();
            const storedHandle = await loadHandle();
            
            if (storedHandle) {
                fileHandle = storedHandle;
                try {
                    // Browsers require a user gesture to prompt, so this handles background verification
                    const isPermitted = await fileHandle.queryPermission({mode: 'readwrite'}) === 'granted';
                    if (isPermitted) {
                        await loadFile();
                    } else {
                        document.getElementById('statusText').innerText = "RESTORED: CLICK 'CONNECT' TO ALLOW EDITING";
                    }
                } catch (e) {
                    document.getElementById('statusText').innerText = "CLICK 'CONNECT' TO RESTORE SESSION";
                }
            }
            if(localStorage.getItem('rateDigi')) document.getElementById('rateDigi').value = localStorage.getItem('rateDigi');
            if(localStorage.getItem('rateMP2')) document.getElementById('rateMP2').value = localStorage.getItem('rateMP2');
            if(localStorage.getItem('rateStock')) document.getElementById('rateStock').value = localStorage.getItem('rateStock');
        };

        async function openMasterFile() {
            try {
                if (fileHandle) {
                    const isPermitted = await verifyPermission(fileHandle, true);
                    if (isPermitted) {
                        await loadFile();
                        return;
                    }
                }
                [fileHandle] = await window.showOpenFilePicker({
                    types: [{ description: 'Excel', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } }],
                    multiple: false
                });
                await saveHandle(fileHandle);
                const permission = await fileHandle.requestPermission({mode: 'readwrite'});
                if (permission === 'granted') loadFile();
            } catch (err) { console.log("Picker closed or access denied"); }
        }

        async function loadFile() {
            const statusEl = document.getElementById('statusText');
            try {
                const file = await fileHandle.getFile();
                const contents = await file.arrayBuffer();
                const workbook = XLSX.read(new Uint8Array(contents), { type: 'array' });
                db = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                setupFilters();
                updateCategoryDropdown();
                updateUI();
                statusEl.innerText = `Connected: ${file.name}`;
                statusEl.classList.replace('text-red-500', 'text-emerald-500');
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').className = "w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-black text-sm uppercase transition-all";
                document.getElementById('submitBtn').innerText = "ADD TO LIST";
                hasUnsavedChanges = false;
                refreshSyncState();
            } catch (err) { 
                statusEl.innerText = `Disconnected`;
                statusEl.classList.replace('text-emerald-500', 'text-red-500');
                alert("File Load Error: Ensure Excel is closed and permissions granted."); 
            }
        }

        function updateUI() {
            const year = parseInt(document.getElementById('filterYear').value);
            const monthVal = document.getElementById('filterMonth').value;
            const body = document.getElementById('tableBody'); body.innerHTML = '';
            
            let curExp = 0, curInc = 0, cats = {}, totalRunningInc = 0, totalRunningExp = 0;
            
            db.forEach((item, index) => {
                const d = new Date(item.Date), iY = d.getFullYear(), iM = d.getMonth();
                const amt = parseFloat(item.Amount) || 0, isExp = item.Type?.toLowerCase() === 'expense';
                isExp ? totalRunningExp += amt : totalRunningInc += amt;
                if (iY === year && (monthVal === "all" || iM === parseInt(monthVal))) {
                    isExp ? (curExp += amt, cats[item.Category] = (cats[item.Category] || 0) + amt) : curInc += amt;
                    const row = `<tr class="border-b border-slate-800/50 hover:bg-slate-800/20 group">
                        <td class="p-3 text-slate-500 text-[10px]">${item.Date}</td>
                        <td class="p-3 font-bold text-slate-300">${item.Category}</td>
                        <td class="p-3 text-right font-mono ${isExp ? 'text-rose-500' : 'text-emerald-400'}">${isExp ? '-' : '+'}${amt.toLocaleString('en-PH', {minimumFractionDigits: 2})}</td>
                        <td class="p-3 text-right w-16"><div class="flex gap-2 justify-end action-btn"><button onclick="editItem(${index})" class="text-blue-400">✎</button><button onclick="deleteItem(${index})" class="text-rose-500">✕</button></div></td>
                    </tr>`;
                    body.insertAdjacentHTML('afterbegin', row);
                }
            });

            const netCashTotal = totalRunningInc - totalRunningExp;
            document.getElementById('statNet').innerText = phFormat.format(netCashTotal);
            document.getElementById('poolMax').innerText = phFormat.format(Math.max(0, netCashTotal));
            
            const rates = [parseFloat(document.getElementById('rateDigi').value), parseFloat(document.getElementById('rateMP2').value), parseFloat(document.getElementById('rateStock').value)];
            const pool = Math.max(0, netCashTotal);
            document.getElementById('yieldDigi').innerText = `+${phFormat.format(pool * (rates[0]/100))}`;
            document.getElementById('yieldMP2').innerText = `+${phFormat.format(pool * (rates[1]/100))}`;
            document.getElementById('yieldStock').innerText = `+${phFormat.format(pool * (rates[2]/100))}`;
            
            document.getElementById('statExp').innerText = phFormat.format(curInc - curExp);
            updateChart(cats);
        }

        // Standard Utility Functions
        function formatInputAmount(input) {
            let value = input.value.replace(/[^0-9.]/g, '');
            const parts = value.split('.');
            if (value !== "") {
                input.value = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",") + (parts.length > 1 ? "." + parts[1].substring(0, 2) : "");
            }
        }

        function limitAndRefresh(el) { if (el.value.length > 3) el.value = el.value.slice(0, 3); updateUI(); }

        function toggleRateEdit() {
            const inputs = [document.getElementById('rateDigi'), document.getElementById('rateMP2'), document.getElementById('rateStock')];
            const isEditing = !inputs[0].disabled;
            inputs.forEach(i => i.disabled = isEditing);
            document.getElementById('rateEditBtn').innerText = isEditing ? "Edit Rates" : "Lock Rates";
            if(isEditing) {
                localStorage.setItem('rateDigi', inputs[0].value);
                localStorage.setItem('rateMP2', inputs[1].value);
                localStorage.setItem('rateStock', inputs[2].value);
            }
        }

        function updateCategoryDropdown() {
            const catSelect = document.getElementById('category');
            const uniqueCategories = [...new Set(db.map(item => item.Category))].filter(Boolean).sort();
            catSelect.innerHTML = `<option value="" disabled selected>Select Category</option><option value="NEW_CAT" class="text-emerald-500 font-bold">+ Add New Category</option>` + uniqueCategories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
        }

        function handleCategoryChange(select) { if (select.value === "NEW_CAT") { document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('modalInput').focus(); } }
        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); document.getElementById('category').value = ""; }
        function confirmNewCategory() {
            const name = document.getElementById('modalInput').value.trim();
            if (name) {
                const opt = document.createElement("option"); opt.value = name; opt.text = name;
                document.getElementById('category').add(opt); document.getElementById('category').value = name;
                document.getElementById('modalOverlay').classList.add('hidden');
            }
        }

        function deleteItem(index) {
            const item = db[index];
            document.getElementById('delInfoCategory').innerText = item.Category;
            document.getElementById('delInfoAmount').innerText = parseFloat(item.Amount).toLocaleString('en-PH');
            document.getElementById('deleteTargetIndex').value = index;
            document.getElementById('deleteModalOverlay').classList.remove('hidden');
        }
        function closeDeleteModal() { document.getElementById('deleteModalOverlay').classList.add('hidden'); }
        function confirmDelete() { db.splice(document.getElementById('deleteTargetIndex').value, 1); hasUnsavedChanges = true; updateUI(); refreshSyncState(); closeDeleteModal(); }

        function editItem(index) {
            const item = db[index];
            document.getElementById('date').value = item.Date;
            document.getElementById('category').value = item.Category;
            document.getElementById('amount').value = item.Amount;
            document.getElementById('type').value = item.Type;
            document.getElementById('editIndex').value = index;
            document.getElementById('submitBtn').innerText = "UPDATE ENTRY";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
        }

        function resetForm() { document.getElementById('txForm').reset(); document.getElementById('editIndex').value = "-1"; document.getElementById('submitBtn').innerText = "ADD TO LIST"; document.getElementById('cancelEditBtn').classList.add('hidden'); document.getElementById('date').valueAsDate = new Date(); }

        function setupFilters() {
            const years = [...new Set(db.map(item => new Date(item.Date).getFullYear()))];
            document.getElementById('filterYear').innerHTML = years.sort((a,b)=>b-a).map(y => `<option value="${y}">${y}</option>`).join('');
            document.getElementById('filterYear').value = new Date().getFullYear();
            document.getElementById('filterMonth').value = new Date().getMonth();
        }

        function updateChart(catData) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(catData), datasets: [{ data: Object.values(catData), backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6'], borderWidth: 4, borderColor: '#0f172a' }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { color: '#64748b', font: { size: 10 }, usePointStyle: true } } } }
            });
        }

        function refreshSyncState() {
            const btn = document.getElementById('syncBtn');
            if (hasUnsavedChanges) {
                btn.disabled = false;
                btn.className = "bg-rose-600 text-white px-6 py-2 rounded-full font-bold text-sm sync-warning cursor-pointer";
            } else {
                btn.disabled = true;
                btn.className = "bg-slate-800 text-slate-500 px-6 py-2 rounded-full font-bold text-sm opacity-50";
            }
        }

        document.getElementById('txForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const entry = { 
                Date: document.getElementById('date').value, 
                Category: document.getElementById('category').value, 
                Amount: parseFloat(document.getElementById('amount').value.replace(/,/g, '')), 
                Type: document.getElementById('type').value 
            };
            const idx = parseInt(document.getElementById('editIndex').value);
            if(idx > -1) db[idx] = entry; else db.push(entry);
            hasUnsavedChanges = true; updateUI(); refreshSyncState(); resetForm();
        });

        async function saveToDisk() {
            if (!fileHandle || !hasUnsavedChanges) return;
            try {
                if (!(await verifyPermission(fileHandle, true))) return;
                const ws = XLSX.utils.json_to_sheet(db), wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Transactions");
                const writable = await fileHandle.createWritable();
                await writable.write(XLSX.write(wb, { bookType: 'xlsx', type: 'array' }));
                await writable.close();
                hasUnsavedChanges = false; refreshSyncState(); window.location.reload();
            } catch (err) { alert("Save failed. Ensure file is closed."); }
        }
    </script>
</body>
</html>
