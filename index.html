<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        #modalOverlay, #deleteModalOverlay { transition: opacity 0.3s ease; }
        /* Action buttons visible on mobile, hover on desktop */
        .action-btn { opacity: 1 !important; }
        @media (min-width: 768px) { 
            .action-btn { opacity: 0; transition: opacity 0.2s; } 
            tr:hover .action-btn { opacity: 1; } 
        }
        #syncBtn { min-width: 120px; justify-content: center; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(225, 29, 72, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }
        .sync-warning { animation: pulse-red 2s infinite; }
        .rate-input { background: transparent; border-bottom: 1px dashed #334155; text-align: center; outline: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 p-4 md:p-8">

    <div id="modalOverlay" class="fixed inset-0 bg-slate-950/60 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl w-full max-w-sm">
            <center><h3 class="text-xl font-bold text-emerald-500 mb-2">New Category</h3></center>
            <input type="text" id="modalInput" placeholder="e.g., Subscriptions" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white outline-none mb-4 ring-2 ring-transparent focus:ring-emerald-500 transition-all">
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold hover:bg-slate-700">Cancel</button>
                <button onclick="confirmNewCategory()" class="flex-1 px-4 py-3 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-500">Create</button>
            </div>
        </div>
    </div>

    <div id="deleteModalOverlay" class="fixed inset-0 bg-slate-950/60 backdrop-blur-md z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl w-full max-sm">
           <center><h3 class="text-xl font-bold text-rose-500 mb-2">Delete Entry?</h3></center>
            <div id="deleteItemDetails" class="bg-slate-950/50 rounded-2xl p-4 mb-6 border border-slate-800 text-center">
                <p id="delInfoDate" class="text-[10px] text-slate-500 font-mono"></p>
                <p id="delInfoCategory" class="text-lg font-bold text-slate-200"></p>
                <p id="delInfoAmount" class="text-xl font-mono font-black"></p>
            </div>
            <input type="hidden" id="deleteTargetIndex">
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 px-4 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold hover:bg-slate-700">Go Back</button>
                <button onclick="confirmDelete()" class="flex-1 px-4 py-3 rounded-xl bg-rose-600 text-white font-bold hover:bg-rose-500">Delete</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col gap-6 mb-8 border-b border-slate-800 pb-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-3xl font-black text-emerald-500 tracking-tighter italic">Financial Analytics</h1><br>
                    <p id="statusText" class="text-red-500 text-xs font-mono uppercase italic">Disconnected</p>
                </div>
                <div class="flex items-center gap-3">
                    <button id="syncBtn" onclick="saveToDisk()" disabled class="bg-slate-800 text-slate-500 px-6 py-2 rounded-full font-bold text-sm flex items-center gap-2 border border-slate-700 transition-all">
                        <span>🔄</span> Sync 
                    </button>
                    <button id="connectBtn" onclick="openMasterFile()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full font-bold text-sm transition-all shadow-lg shadow-blue-900/20">
                        📂 Connect File
                    </button>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-4 bg-slate-900 p-4 rounded-2xl border border-slate-800">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 mb-1 uppercase">Year</label>
                    <select id="filterYear" onchange="updateUI()" class="bg-slate-800 border-none rounded-lg p-2 text-sm text-white outline-none w-32"></select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 mb-1 uppercase">Month</label>
                    <select id="filterMonth" onchange="updateUI()" class="bg-slate-800 border-none rounded-lg p-2 text-sm text-white outline-none w-40">
                        <option value="all">Full Year (All)</option>
                        <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                        <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                        <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                        <option value="9">October</option><option value="10">November</option><option value="11">December</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-stretch">
            <div class="lg:col-span-1 flex flex-col gap-6">
                <section class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                    <h2 class="text-lg font-bold mb-4 text-slate-300">Log Entry</h2>
                    <form id="txForm" class="space-y-4">
                        <input type="hidden" id="editIndex" value="-1">
                        <input type="date" id="date" required class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm text-white outline-none">
                        <select id="category" required onchange="handleCategoryChange(this)" class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm text-white outline-none"></select>
                        <input type="text" id="amount" placeholder="Amount" required oninput="formatInputAmount(this)" class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm text-white outline-none font-mono">
                        <select id="type" class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm text-white outline-none">
                            <option value="Expense">Expense</option>
                            <option value="Income">Income</option>
                        </select>
                        <button type="submit" id="submitBtn" disabled class="w-full bg-slate-800 text-slate-600 py-4 rounded-xl font-black text-sm uppercase border border-slate-700">Connect First</button>
                        <button type="button" id="cancelEditBtn" onclick="resetForm()" class="hidden w-full bg-slate-700 text-slate-300 py-2 rounded-lg text-xs uppercase font-bold">Cancel Edit</button>
                    </form>
                </section>

                <section class="bg-slate-900 p-6 rounded-2xl border border-emerald-900/30 bg-gradient-to-b from-slate-900 to-emerald-950/20 shadow-2xl flex-grow">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-black text-emerald-400 uppercase">Yield Pool</h2>
                        <button onclick="toggleRateEdit()" id="rateEditBtn" class="text-[10px] font-bold text-slate-500 uppercase">Edit Rates</button>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <p class="text-[10px] text-slate-500 uppercase">Max Investable</p>
                            <p id="poolMax" class="text-2xl font-mono text-white font-black">₱ 0.00</p>
                        </div>
                        <div class="space-y-2 pt-2 border-t border-slate-800">
                            <div class="flex justify-between text-xs">
                                <span class="text-slate-400 flex items-center gap-1">(<input type="number" id="rateDigi" value="6" step="0.1" oninput="limitAndRefresh(this)" class="rate-input" style="width: 3ch;" disabled>%) Digital Banks </span>
                                <span id="yieldDigi" class="font-mono text-emerald-500">+₱ 0.00</span>
                            </div>
                            <div class="flex justify-between text-xs">
                                <span class="text-slate-400 flex items-center gap-1">(<input type="number" id="rateMP2" value="7" step="0.1" oninput="limitAndRefresh(this)" class="rate-input" style="width: 3ch;" disabled>%) MP2 </span>
                                <span id="yieldMP2" class="font-mono text-emerald-500">+₱ 0.00</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-3 flex flex-col gap-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 h-fit">
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                        <p id="labelNet" class="text-[10px] text-slate-500 uppercase font-black">Net Cash</p>
                        <p id="statNet" class="text-2xl font-mono text-white mt-1">₱ 0.00</p>
                    </div>
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                        <p id="labelExp" class="text-[10px] text-slate-500 uppercase font-black">Cash Flow</p>
                        <p id="statExp" class="text-2xl font-mono text-white mt-1">₱ 0.00</p>
                    </div>
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg relative overflow-hidden">
                        <p id="labelPrev" class="text-[10px] text-slate-500 uppercase font-black">Prev Year</p>
                        <p id="statPrevYear" class="text-2xl font-mono text-white mt-1">₱ 0.00</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 flex-grow">
                    <div class="bg-slate-900 rounded-2xl border border-slate-800 flex flex-col shadow-xl overflow-hidden h-full">
                        <div class="p-3 bg-slate-800/30 text-[10px] font-black uppercase">Finance History</div>
                        <div class="overflow-y-auto custom-scrollbar flex-grow">
                            <table class="w-full text-xs text-left">
                                <tbody id="tableBody"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex flex-col shadow-xl h-full">
                        <div class="text-[10px] font-black uppercase text-slate-500 mb-4">Expense Distribution</div>
                        <div class="flex-grow flex items-center justify-center min-h-0">
                            <canvas id="mainChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let fileHandle;
        let db = [];
        let chartInstance = null;
        let hasUnsavedChanges = false;
        const phFormat = new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' });

        // Storage Logic
        const DB_NAME = "FileStorage";
        const STORE_NAME = "handles";
        async function getDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
                request.onsuccess = (e) => resolve(e.target.result);
            });
        }
        async function saveHandle(handle) {
            const dbObj = await getDB();
            dbObj.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).put(handle, "last_handle");
        }
        async function loadHandle() {
            const dbObj = await getDB();
            return new Promise((resolve) => {
                const request = dbObj.transaction(STORE_NAME).objectStore(STORE_NAME).get("last_handle");
                request.onsuccess = () => resolve(request.result);
            });
        }

        window.onload = async () => {
            document.getElementById('date').valueAsDate = new Date();
            const storedHandle = await loadHandle();
            if (storedHandle) {
                fileHandle = storedHandle;
                document.getElementById('statusText').innerText = "TAP 'CONNECT' TO RE-SYNC FILE";
            }
        };

        // UI Interactions
        function formatInputAmount(input) {
            let value = input.value.replace(/[^0-9.]/g, '');
            const parts = value.split('.');
            if (parts.length > 2) value = parts[0] + '.' + parts.slice(1).join('');
            if (value !== "") {
                let formatted = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                input.value = (parts.length > 1) ? formatted + "." + parts[1].substring(0, 2) : formatted;
            }
        }

        async function openMasterFile() {
            try {
                if (window.showOpenFilePicker) {
                    [fileHandle] = await window.showOpenFilePicker({
                        types: [{ description: 'Excel', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } }],
                        multiple: false
                    });
                    await saveHandle(fileHandle);
                    const permission = await fileHandle.requestPermission({mode: 'readwrite'});
                    if (permission === 'granted') loadFile();
                } else {
                    alert("Sync not supported on this browser. Opening file in View-Only mode.");
                    const input = document.createElement('input');
                    input.type = 'file'; input.accept = '.xlsx';
                    input.onchange = (e) => {
                        const reader = new FileReader();
                        reader.onload = (event) => processData(event.target.result);
                        reader.readAsArrayBuffer(e.target.files[0]);
                    };
                    input.click();
                }
            } catch (err) { console.log("Picker closed"); }
        }

        async function loadFile() {
            try {
                const file = await fileHandle.getFile();
                const contents = await file.arrayBuffer();
                processData(contents);
                document.getElementById('statusText').innerText = `Connected: ${file.name}`;
                document.getElementById('statusText').classList.replace('text-red-500', 'text-emerald-500');
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').className = "w-full bg-emerald-600 text-white py-4 rounded-xl font-black text-sm uppercase";
                document.getElementById('submitBtn').innerText = "ADD TO LIST";
            } catch (err) { alert("Error loading file."); }
        }

        function processData(contents) {
            const workbook = XLSX.read(new Uint8Array(contents), { type: 'array' });
            db = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            setupFilters();
            updateCategoryDropdown();
            updateUI();
            hasUnsavedChanges = false;
            refreshSyncState();
        }

        function updateUI() {
            const year = parseInt(document.getElementById('filterYear').value);
            const monthVal = document.getElementById('filterMonth').value;
            const body = document.getElementById('tableBody'); body.innerHTML = '';
            
            let curExp = 0, curInc = 0, cats = {}, prevYrExp = 0, prevYrInc = 0;
            let totalRunningInc = 0, totalRunningExp = 0;
            
            db.forEach((item, index) => {
                const d = new Date(item.Date), iY = d.getFullYear(), iM = d.getMonth();
                const amt = parseFloat(item.Amount) || 0, isExp = item.Type?.toLowerCase() === 'expense';
                isExp ? totalRunningExp += amt : totalRunningInc += amt;

                if (iY === year && (monthVal === "all" || iM === parseInt(monthVal))) {
                    isExp ? (curExp += amt, cats[item.Category] = (cats[item.Category] || 0) + amt) : curInc += amt;
                    const row = `<tr class="border-b border-slate-800/50 hover:bg-slate-800/20">
                        <td class="p-3 text-slate-500 text-[10px]">${item.Date}</td>
                        <td class="p-3 font-bold text-slate-300">${item.Category}</td>
                        <td class="p-3 text-right font-mono ${isExp ? 'text-rose-500' : 'text-emerald-400'}">${isExp ? '-' : '+'}${phFormat.format(amt).replace('PHP', '').trim()}</td>
                        <td class="p-3 text-right">
                            <div class="flex gap-2 justify-end action-btn">
                                <button onclick="editItem(${index})" class="text-blue-400 p-2">✎</button>
                                <button onclick="deleteItem(${index})" class="text-rose-500 p-2">✕</button>
                            </div>
                        </td>
                    </tr>`;
                    body.insertAdjacentHTML('afterbegin', row);
                }
                if (iY === year - 1 && (monthVal === "all" || iM === parseInt(monthVal))) {
                    isExp ? prevYrExp += amt : prevYrInc += amt;
                }
            });

            const netTotal = totalRunningInc - totalRunningExp;
            document.getElementById('statNet').innerText = phFormat.format(netTotal);
            document.getElementById('poolMax').innerText = phFormat.format(Math.max(0, netTotal));
            document.getElementById('statExp').innerText = phFormat.format(curInc - curExp);
            document.getElementById('statPrevYear').innerText = phFormat.format(prevYrInc - prevYrExp);

            const poolVal = Math.max(0, netTotal);
            document.getElementById('yieldDigi').innerText = `+${phFormat.format(poolVal * (parseFloat(document.getElementById('rateDigi').value)/100))}`;
            
            updateChart(cats);
        }

        // ROLLED BACK FUNCTIONS
        function editItem(index) {
            const item = db[index];
            document.getElementById('date').value = item.Date;
            document.getElementById('category').value = item.Category;
            const amtInput = document.getElementById('amount');
            amtInput.value = item.Amount;
            formatInputAmount(amtInput);
            document.getElementById('type').value = item.Type;
            document.getElementById('editIndex').value = index;
            document.getElementById('submitBtn').innerText = "UPDATE ENTRY";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('txForm').reset();
            document.getElementById('editIndex').value = "-1";
            document.getElementById('submitBtn').innerText = "ADD TO LIST";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('date').valueAsDate = new Date();
        }

        function deleteItem(index) {
            const item = db[index];
            document.getElementById('delInfoDate').innerText = item.Date;
            document.getElementById('delInfoCategory').innerText = item.Category;
            document.getElementById('delInfoAmount').innerText = phFormat.format(item.Amount);
            document.getElementById('deleteTargetIndex').value = index;
            document.getElementById('deleteModalOverlay').classList.remove('hidden');
        }

        function confirmDelete() {
            const index = document.getElementById('deleteTargetIndex').value;
            db.splice(index, 1);
            hasUnsavedChanges = true;
            updateUI();
            refreshSyncState();
            closeDeleteModal();
        }

        function closeDeleteModal() { document.getElementById('deleteModalOverlay').classList.add('hidden'); }

        document.getElementById('txForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const amt = document.getElementById('amount').value.replace(/,/g, '');
            const entry = { Date: document.getElementById('date').value, Category: document.getElementById('category').value, Amount: parseFloat(amt), Type: document.getElementById('type').value };
            
            const editIdx = parseInt(document.getElementById('editIndex').value);
            if(editIdx > -1) { db[editIdx] = entry; } else { db.push(entry); }
            
            hasUnsavedChanges = true; updateUI(); refreshSyncState(); resetForm();
        });

        async function saveToDisk() {
            try {
                const ws = XLSX.utils.json_to_sheet(db);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Transactions");
                const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });

                if (fileHandle && fileHandle.createWritable) {
                    const writable = await fileHandle.createWritable();
                    await writable.write(wbout);
                    await writable.close();
                    alert("Saved Successfully!");
                    window.location.reload();
                } else {
                    const blob = new Blob([wbout], {type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url; a.download = "Finance_Update.xlsx"; a.click();
                    alert("Download started as browser sync is unavailable.");
                }
                hasUnsavedChanges = false;
                refreshSyncState();
            } catch (err) { alert("Permission denied. Close the file if open elsewhere."); }
        }

        function refreshSyncState() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = !hasUnsavedChanges;
            btn.className = hasUnsavedChanges ? "bg-rose-600 text-white px-6 py-2 rounded-full font-bold text-sm sync-warning" : "bg-slate-800 text-slate-500 px-6 py-2 rounded-full font-bold text-sm border border-slate-700 opacity-50";
        }

        function handleCategoryChange(select) {
            if (select.value === "NEW_CAT") document.getElementById('modalOverlay').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); document.getElementById('category').value = ""; }
        function confirmNewCategory() {
            const name = document.getElementById('modalInput').value.trim();
            if (name) {
                const opt = document.createElement("option"); opt.value = name; opt.text = name;
                document.getElementById('category').add(opt);
                document.getElementById('category').value = name;
                document.getElementById('modalOverlay').classList.add('hidden');
            }
        }
        function setupFilters() {
            const curY = new Date().getFullYear();
            const years = [...new Set(db.map(item => new Date(item.Date).getFullYear()))];
            if (!years.includes(curY)) years.push(curY);
            document.getElementById('filterYear').innerHTML = years.sort((a,b)=>b-a).map(y => `<option value="${y}">${y}</option>`).join('');
            document.getElementById('filterYear').value = curY;
            document.getElementById('filterMonth').value = new Date().getMonth();
        }
        function updateCategoryDropdown() {
            const cats = [...new Set(db.map(item => item.Category))].filter(Boolean).sort();
            document.getElementById('category').innerHTML = `<option value="" disabled selected>Select Category</option><option value="NEW_CAT" class="text-emerald-500">+ Add New</option>` + cats.map(c => `<option value="${c}">${c}</option>`).join('');
        }
        function updateChart(catData) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(catData), datasets: [{ data: Object.values(catData), backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6'], borderWidth: 4, borderColor: '#0f172a' }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } }
            });
        }
        function toggleRateEdit() {
            const inp = document.getElementById('rateDigi');
            inp.disabled = !inp.disabled;
            document.getElementById('rateEditBtn').innerText = inp.disabled ? "Edit Rates" : "Lock Rates";
        }
        function limitAndRefresh(el) { if (el.value.length > 3) el.value = el.value.slice(0, 3); updateUI(); }
    </script>
</body>
</html>
